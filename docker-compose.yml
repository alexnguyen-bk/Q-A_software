services:
  app_java:
    build: .
    container_name: interview_app
    ports:
      - "8386:8386"
    depends_on:
      - mongodb_local
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb_local:27017/interview_db
    # 👇 Thêm phần này để Docker Watch tự động rebuild khi có thay đổi
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./pom.xml

  mongodb_local:
    image: mongo:latest
    container_name: mongodb_interview
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: